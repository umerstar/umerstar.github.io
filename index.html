<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>umerstar</title>
  <meta name="description" content="Computer engineer. Web, homelab, hardware, automation.">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --fg: #e6edf3;
      --muted: #8b949e;
      --accent: #7aa2f7;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
      display: grid;
      place-items: center;
      padding: 2rem;
    }
    main { max-width: 540px; }
    h1 {
      margin: 0 0 .5rem;
      font-size: 2.5rem;
      letter-spacing: -0.02em;
    }
    .tag { color: var(--muted); margin: 0 0 2rem; }
    p { margin: 0 0 1rem; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    ul { padding-left: 1.2rem; }
    li { margin: .25rem 0; }
    footer { margin-top: 2.5rem; color: var(--muted); font-size: .9rem; }
  </style>
</head>
<body>
  <main>
    <h1>umerstar</h1>
    <p class="tag">Computer engineer. Web, homelab, hardware, automation.</p>

    <p>This site is a placeholder while I move things into the open. Soon: writeups on the homelab, n8n automations, and small hardware projects.</p>

    <p>In the meantime:</p>
    <ul>
      <li><a href="https://github.com/umerstar">GitHub</a></li>
    </ul>

    <footer>
      &copy; umerstar
    </footer>
  </main>
</body>
</html>
